syntax = "proto3";

package auth.v1;

option go_package = "github.com/zhanbinb/go-clean-arch_demo/api/gen/go/auth/v1;authv1";

// AuthService — gRPC stub (not implemented in v2).
service AuthService {
  rpc Login(LoginRequest) returns (LoginResponse);
}

message LoginRequest {
  string username = 1;
  string password = 2;
}
message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_in = 3;
}
