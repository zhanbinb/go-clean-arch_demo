server:
  http_port: 9090
  grpc_port: 9091
  mode: debug

database:
  host: 127.0.0.1
  port: 3306
  user: app
  password: app
  name: article
  max_open_conns: 50
  max_idle_conns: 10
  conn_max_lifetime: 3600
  log_level: warn

jwt:
  secret: "change-me-in-production-min-32-bytes-long"
  ttl: 1h
  refresh_ttl: 24h

log:
  level: info
  format: console

cors:
  allow_origins:
    - "*"
  allow_methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
    - OPTIONS
  allow_headers:
    - Origin
    - Content-Type
    - Authorization
    - X-Request-ID
  expose_headers:
    - X-Request-ID
  allow_credentials: false
  max_age: 43200

ratelimit:
  enabled: true
  rps: 100
  burst: 200
  cleanup_interval: 300
  dimension: ip

swagger:
  enabled: true
  path: /swagger
