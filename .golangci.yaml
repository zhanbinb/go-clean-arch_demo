version: "2"
run:
  timeout: 10m
  tests: true

linters:
  enable:
    - errcheck
    - goconst
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unconvert
    - unparam
    - unused

linters-settings:
  gocyclo:
    min-complexity: 20
  goconst:
    min-len: 3
    min-occurrences: 3
  misspell:
    locale: US
  revive:
    confidence: 0.8
    severity: warning
    rules:
      - name: exported
        severity: off
      - name: package-comments
        severity: off
      - name: var-naming
        severity: warning
      - name: error-strings
        severity: warning
      - name: error-naming
        severity: warning
      - name: error-return
        severity: warning
      - name: if-return
        severity: warning
      - name: blank-imports
        severity: warning
      - name: context-as-argument
        severity: warning
      - name: context-keys-type
        severity: warning
  gosec:
    excludes:
      - G104  # unhandled errors - covered by errcheck

issues:
  exclude-dirs:
    - api/gen
    - docs/swagger
    - tmp
    - bin
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - goconst
  max-same-issues: 0
