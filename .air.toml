# Air hot-reload configuration for Go.
# https://github.com/air-verse/air

root = "."
test_data_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = []
  bin = "./tmp/rest"
  cmd = "go build -trimpath -o ./tmp/rest ./cmd/rest"
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "docs/swagger", "api/gen"]
  exclude_file = []
  exclude_regex = ["_test\\.go"]
  exclude_unchanged = true
  follow_symlink = false
  full_bin = ""
  include_dir = ["cmd", "internal", "pkg"]
  include_ext = ["go", "yaml", "yml", "toml"]
  kill_delay = "1s"
  log = "build-errors.log"
  send_interrupt = false
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  silent = false
  time = true

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = false
  keep_scroll = true
